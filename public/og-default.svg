<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .paper { fill: #F8F6F1; }
      .ink { fill: #173847; }
      .purple { fill: #7C4DFF; }
      .deep-purple { fill: #6200EA; }
      .teal { fill: #1F789B; }
      .stone { fill: #E8E5DD; }
      .arabic-display { font-family: 'Reem Kufi', 'Tajawal', 'Helvetica Neue', sans-serif; font-weight: 700; }
      .display-serif { font-family: 'Fraunces', 'Tiempos Headline', Georgia, serif; font-weight: 400; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
    </style>
  </defs>

  <!-- Warm paper canvas -->
  <rect width="1200" height="630" class="paper"/>

  <!-- Hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#E8E5DD" stroke-width="1"/>

  <!-- Top-left brand mark (uses the actual app icon) -->
  <image x="80" y="80" width="56" height="56" xlink:href="/brand-mark.png"/>
  <text x="156" y="118" class="display-serif ink" font-size="32" letter-spacing="-0.5">Irab</text>

  <!-- Top-right meta pill -->
  <g transform="translate(1100, 110)">
    <rect x="-180" y="-20" width="180" height="32" rx="16" fill="#7C4DFF" fill-opacity="0.08" stroke="#7C4DFF" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="-160" cy="-4" r="3" class="purple"/>
    <text x="-148" y="2" class="mono deep-purple" font-size="13" letter-spacing="1.5">5.0 ★ ON GOOGLE PLAY</text>
  </g>

  <!-- Center: hero word -->
  <text x="600" y="350" text-anchor="middle" class="arabic-display deep-purple" font-size="220" direction="rtl">إعراب</text>

  <!-- Headline beneath -->
  <text x="600" y="450" text-anchor="middle" class="display-serif ink" font-size="42" letter-spacing="-0.5">
    Parse Arabic the way <tspan font-style="italic" class="teal">scholars</tspan> do.
  </text>

  <!-- Hairline divider -->
  <line x1="540" y1="495" x2="660" y2="495" stroke="#7C4DFF" stroke-width="2"/>

  <!-- URL line -->
  <text x="600" y="528" text-anchor="middle" class="mono ink" font-size="18" letter-spacing="3" fill-opacity="0.7">IRAB.APP</text>

  <!-- Bottom-right purple accent dot -->
  <circle cx="1100" cy="540" r="6" class="purple"/>
  <line x1="1080" y1="540" x2="1090" y2="540" class="purple" stroke="#7C4DFF" stroke-width="2"/>
</svg>
